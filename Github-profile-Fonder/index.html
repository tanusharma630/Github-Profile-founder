<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github profile Founder</title>
</head>
<body>
    <div class="Profile">
        <h1 class="heading">Github Profile finder <span><img src="https://cdn-icons-png.flaticon.com/128/919/919847.png" class="imgg"></span></h1>
        <div class="btn">
            <input type="text" id="find" placeholder="Enter your url">
            <button id="button">Search</button>
        </div>

        <div id="empty"></div>
    </div>


    <style>
      
      body{
          position:relative;
      }
      
      .Profile{
          position:relative;
          z-index:10;
      }
      
      body::before,
      body::after{
          z-index:-1;
      }

        body{
    margin:37px;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#3b82f6 0%,transparent 35%),
    radial-gradient(circle at bottom right,#9333ea 0%,transparent 35%),
    #050816;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(white 1px,transparent 1px);
    background-size:50px 50px;
    opacity:.15;
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#2563eb;
    border-radius:50%;
    filter:blur(120px);
    top:-100px;
    left:-100px;
    opacity:.4;
}


          .Profile{
            display: flex;
            justify-self: center;
            align-items: center;
            flex-direction: column;
            background-color: rgb(40, 40, 40);
            max-width: fit-content;
            max-height: fit-content;
            border-radius: 20px;
            padding: 20px 40px ;
            padding-bottom: 60px;
          }

          .imgg{
            width: 50px;
            height: 50px;
            border-radius: 53px;
          }

          .Profile:hover{
                 transform:translateY(-4px);
                 box-shadow:0 15px 30px rgba(228, 228, 228, 0.25);
          }

          .btn{
            display: flex;
            gap: 8px;
          }

          #find{
            display: flex;
            justify-content: center;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            width: 250px;
          }

          .heading{
            text-align: center;
            margin: 20px 30px;
            color: white;
          }

          button{
            padding: 16px;
            border: none;
            font-size: 20px;
            border-radius: 20px;
            width: 120px;
          }

          button:hover{
            background: linear-gradient(240deg , rgb(251, 134, 251), rgb(116, 116, 248), rgb(165, 219, 241));
          }

          .empty{
          max-height: 80vh;
           display: flex;
            justify-self: center;
            align-items: center;
            flex-direction: row;
            gap: 200px;
            margin-top: 50px;
            color: aliceblue;
          }
          .empty h3{
            color: rgb(255, 255, 255);
          }

          .empty h3{
              background:rgba(255,255,255,.08);
              border:1px solid rgba(255,255,255,.12);
              border-radius:20px;
              padding:18px;
              transition:.3s;
              position:relative;
              overflow:hidden;
              height: 50px;
          }

              .empty h3::before{
                content:"";
                position:absolute;
                inset:0;
            background:linear-gradient(
            135deg,
            rgba(255,255,255,.15),
            transparent
        );

                 opacity:0;
                 transition:.3s;
          }
          .empty h3:hover::before{
                 opacity:1;
          }

          .empty h3:hover{
                 transform:translateY(-6px);
                 box-shadow:0 15px 30px rgba(0,0,0,.25);
          }
  

          .empty button{
            width: 200px;
            border: none;
            color: rgb(0, 0, 0);
        }
        
        .empty a{
              text-decoration: none;
          }

          .image{
            width: 200px;
            height: 200px;
            border-radius: 100px;
            border: 3px solid rgb(71, 195, 245);
          }

          .flex{
            display: block;
            justify-content: center;
            flex-direction: column;
          }


        .inner-div{
          display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
        }

        .empty span{
          display: flex;
          flex-direction: row;
          align-items: center;
          color: rgb(71, 195, 245);
        }
    </style>

    <script>
        const input = document.getElementById("find")
        const button = document.getElementById("button")
        const card = document.getElementById("empty")


    async function loadUser() {
        const find = input.value.trim()
        if(!find){
            card.innerHTML = "<p>Please enter the Github profile</p>"
            return
        }
        card.innerHTML= "<p>Loading....</p>"

        try{
            const response = await fetch(`https://api.github.com/users/${find}`)
            
            if(!response.ok){
                throw new Error("user not found")
            }
            
           const data = await response.json()
           console.log(data)
           card.innerHTML=`<div class = "empty">
            <div class ="flex">
              <img src = "${data.avatar_url}" class ="image"/>
                <h2> ✦ Login: ${data.login}</h2>
               <h2> ✦ ID: ${data.id}</h2>
               <button><a href = "${data.html_url}" target="_blank" </a>Visit Profile</button>
                </div>
                <div class= "main">
                  <div class = "inner-div">
               <h3> ✦ FOLLOWERS: <span>${data.followers}</span></h3>
               <h3> ✦ BIO: <span>${data.bio}</span></h3>
               </div>
               <div class = "inner-div">
               <h3> ✦ PUBLIC_REPO: <span>${data.public_repos}</span></h3>
               <h3> ✦ FOLLOWING: <span>${data.following}</span></h3>
               </div>
               <div class = "inner-div">
               <h3> ✦ LOCATION: <span>${data.location}</span></h3>
               <h3> ✦ COMPANY: <span>${data.company}</span></h3>
               </div>
               </div>
               </div>`

        }catch(err){
            console.log("No user found - please enter the valid Username",err)
        }
 
    }

   button.addEventListener("click", loadUser)

    </script>
</body>
</html>
